<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="RADAR V22 + Método L.O - Sistema de Análise de Jogos" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
    <title>Método L.O | RADAR V22</title>
    <style>
      /* Block text selection */
      * { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; }
      input, textarea { -webkit-user-select: text !important; -moz-user-select: text !important; -ms-user-select: text !important; user-select: text !important; }
    </style>
    <script>
      // === FULL PROTECTION AGAINST CODE INSPECTION ===

      // 1. Block right-click everywhere
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; }, true);

      // 2. Block ALL dev tools keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
        // Ctrl+U (view source)
        if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
        // Ctrl+S (save page)
        if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
        // Ctrl+A (select all)
        if (e.ctrlKey && e.keyCode === 65) { e.preventDefault(); return false; }
        // Ctrl+C (copy)
        if (e.ctrlKey && e.keyCode === 67 && !e.shiftKey) { 
          var el = document.activeElement;
          if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) { e.preventDefault(); return false; }
        }
        // Ctrl+P (print)
        if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); return false; }
      }, true);

      // 3. Block drag
      document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; }, true);

      // 4. Block copy
      document.addEventListener('copy', function(e) {
        var el = document.activeElement;
        if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) { e.preventDefault(); return false; }
      }, true);

      // 5. Debugger trap - freezes DevTools when opened
      (function() {
        function detect() {
          debugger;
          setTimeout(detect, 100);
        }
        detect();
      })();

      // 6. Clear console constantly
      setInterval(function() {
        console.clear();
        console.log('%cACESSO BLOQUEADO', 'color:red;font-size:50px;font-weight:bold');
        console.log('%cO código deste aplicativo é protegido.', 'color:white;font-size:16px');
      }, 1000);

      // 7. Detect DevTools via window size (dock mode changes size)
      (function() {
        var threshold = 160;
        function check() {
          if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#D4AF37;font-size:24px;font-weight:bold;text-align:center;padding:20px;">ACESSO BLOQUEADO<br><br><span style="font-size:14px;color:#888;">Feche as ferramentas de desenvolvedor para continuar.</span></div>';
          }
        }
        setInterval(check, 500);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
